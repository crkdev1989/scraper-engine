name: real_estate_agents
mode: directory_list
description: Sample directory_list preset for extracting agent rows from a directory page.

requests:
  timeout_seconds: 25
  retries: 3
  backoff_seconds: 2.0

crawl:
  mode: directory_list
  same_domain_only: true
  max_pages: 10
  concurrency: 6
  priority_keywords:
    - agents
    - team
    - staff
    - office
    - contact
  store_debug_html: false

extraction:
  record_selector:
    css: ".agent-card, .team-member, .staff-card, .listing-card"
  fields:
    - name: business_name
      selector: ".listing-title, .agent-name, .team-member__name, h2, h3"
    - name: website
      selector: "a.website, a[href]"
      attribute: "href"
    - name: phone
      selector: ".phone, a[href^='tel:']"
    - name: city
      selector: ".city"
    - name: state
      selector: ".state"

output:
  root_dir: outputs
  merge_rows: false
  write_csv: true
  write_json: true
  write_summary: true
  write_report: true

logging:
  level: INFO
  file_name: run.log

sync:
  enabled: false
  strategy: rsync
  dry_run: true

schema:
  name: real_estate_agents
  columns:
    - input_url
    - source_url
    - page_url
    - business_name
    - website
    - phone
    - city
    - state

metadata:
  audience: private
  engine_mode: directory_list
