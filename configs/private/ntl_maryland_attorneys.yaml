name: ntl_maryland_attorneys
mode: directory_detail
description: Private Playwright-backed directory_detail preset for The National Trial Lawyers Maryland member directory.

static_targets:
  - https://thenationaltriallawyers.org/member-directory/?_regions=maryland

requests:
  timeout_seconds: 45
  retries: 2
  backoff_seconds: 2.0
  user_agent: scraper-engine/private-playwright

crawl:
  mode: directory_detail
  same_domain_only: true
  max_pages: 1
  concurrency: 1
  store_debug_html: false

extraction:
  fields: []
  detail_page:
    enabled: true
    url_field: detail_url
    fields:
      - name: name
        xpath: "normalize-space((//main//h1)[1])"
      - name: law_firm
        xpath: "normalize-space((//main//*[self::h2 or self::h3 or self::h4 or self::h5 or self::p][normalize-space() and normalize-space() != normalize-space((//main//h1)[1])][1])[1])"
      - name: city
        selector: "main"
        transforms:
          - type: collapse_whitespace
          - type: regex_extract
            pattern: "\\b([A-Za-z][A-Za-z .'-]+),\\s+[A-Z]{2}\\b"
            group: 1
      - name: state
        selector: "main"
        transforms:
          - type: collapse_whitespace
          - type: regex_extract
            pattern: "\\b[A-Za-z][A-Za-z .'-]+,\\s+([A-Z]{2})\\b"
            group: 1
      - name: website
        xpath: "(//a[normalize-space()='Website']/@href)[1]"
      - name: phone
        xpath: "(//a[starts-with(@href, 'tel:')]/@href)[1]"
        transforms:
          - type: strip_prefix
            value: "tel:"

output:
  root_dir: outputs
  merge_rows: false
  write_csv: true
  write_json: true
  write_summary: true
  write_report: true
  shaping:
    cleanup_common_fields: true
    field_order:
      - input_url
      - source_directory
      - source_url
      - profile_url
      - detail_url
      - name
      - law_firm
      - city
      - state
      - website
      - phone

limits:
  max_records: 1000
  max_detail_pages: 1000

logging:
  level: INFO
  file_name: run.log

sync:
  enabled: false
  strategy: rsync
  dry_run: true

schema:
  name: ntl_maryland_attorneys
  columns:
    - input_url
    - source_directory
    - source_url
    - profile_url
    - detail_url
    - name
    - law_firm
    - city
    - state
    - website
    - phone

metadata:
  audience: private
  private_only: true
  engine_mode: directory_detail
  renderer: playwright
  playwright:
    browser: chromium
    headless: true
    directory_wait_until: domcontentloaded
    detail_wait_until: domcontentloaded
    cookie_accept_selector: "text=Accept"
    load_more_selector: "text=Load More Attorneys"
    profile_link_selector: "a[href*='/members/']"
    detail_wait_selector: "h1"
    max_load_more_clicks: 200
    post_click_wait_ms: 1200
    post_cookie_wait_ms: 500
    use_profile_urls_as_records: true
