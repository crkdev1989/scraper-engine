name: law_firms
mode: directory_detail
description: Sample directory_detail preset for enriching law firm listings from profile pages.

requests:
  timeout_seconds: 25
  retries: 3
  backoff_seconds: 2.0

crawl:
  mode: directory_detail
  same_domain_only: true
  max_pages: 10
  concurrency: 5
  priority_keywords:
    - attorneys
    - lawyers
    - team
    - staff
    - contact
  store_debug_html: false

extraction:
  record_selector:
    css: ".listing-card, .attorney-card, .profile-card"
  fields:
    - name: attorney_name
      selector: ".attorney-name, .profile-name, h2, h3"
    - name: firm_name
      selector: ".firm-name"
    - name: detail_url
      selector: "a.profile, a.attorney-link, a[href]"
      attribute: "href"
  detail_page:
    enabled: true
    url_field: detail_url
    fields:
      - name: email
        selector: "a[href^='mailto:']"
        attribute: "href"
      - name: website
        selector: "a.website, a[href*='http']"
        attribute: "href"
      - name: address
        selector: ".address, address"
      - name: bio
        selector: ".bio, .profile-bio, .attorney-bio"
      - name: practice_areas
        selector: ".practice-areas li, .services li"
        many: true
        default: []

pagination:
  enabled: true
  max_pages: 5
  next_page:
    css: "a.next, a[rel='next'], .pagination a.next"
    attribute: "href"

output:
  root_dir: outputs
  merge_rows: false
  write_csv: true
  write_json: true
  write_summary: true
  write_report: true

logging:
  level: INFO
  file_name: run.log

sync:
  enabled: false
  strategy: rsync
  dry_run: true

schema:
  name: law_firms
  columns:
    - input_url
    - source_url
    - attorney_name
    - firm_name
    - detail_url
    - email
    - website
    - address
    - bio
    - practice_areas

metadata:
  audience: private
  engine_mode: directory_detail
